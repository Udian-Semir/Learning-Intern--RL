# ============================================================================
# Sai0-VLA Conda 环境配置文件
# ============================================================================
#
# 使用方式:
#   创建新环境:
#     conda env create -f environment.yml
#
#   更新现有环境:
#     conda env update -f environment.yml --prune
#
#   激活环境:
#     conda activate qwen_eagle_hwl
#
# 注意:
#   - 此配置文件针对 CUDA 12.8 进行了优化
#   - 如需使用其他 CUDA 版本，请使用 install_env.sh 脚本
#   - PyTorch 推荐手动安装: pip3 install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu128
#
# ============================================================================

name: qwen_eagle_hwl

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python 版本
  - python=3.10.0

  # ========== PyTorch (CUDA 12.8) ==========
  # 注意: PyTorch 推荐通过 pip 安装以获取 CUDA 12.8 支持
  # pip3 install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu128

  # ========== 系统工具 ==========
  - pip
  - ffmpeg>=4.0.0

  # ========== pip 安装的包 ==========
  - pip:
      # PyTorch (CUDA 12.8)
      - torch==2.8.0
      - torchvision==0.23.0
      - --index-url https://download.pytorch.org/whl/cu128

      # 核心数据处理
      - numpy==2.2.6
      - pandas==2.3.3
      - pyarrow==22.0.0
      - scipy==1.15.3

      # 图像处理
      - pillow==11.3.0
      - opencv-python==4.12.0.88
      - opencv-python-headless==4.12.0.88

      # 视频处理
      - imageio==2.37.2
      - imageio-ffmpeg==0.6.0
      - av==16.0.1

      # 工具库
      - tqdm==4.67.1
      - pyyaml==6.0.3
      - einops==0.8.1
      - rich==14.2.0

      # Transformers 生态
      - transformers>=4.43.0
      - accelerate==1.11.0
      - safetensors==0.6.2
      - tokenizers==0.22.1
      - huggingface_hub==1.1.2

      # Qwen-VL 相关
      - qwen-vl-utils>=0.0.2
      - tiktoken==0.12.0

      # 扩散模型
      - diffusers==0.35.2
      - peft==0.18.0

      # Web 框架 (部署)
      - fastapi==0.121.2
      - uvicorn==0.38.0
      - pydantic==2.12.4
      - starlette==0.49.3
      - requests==2.32.5
      - httpx==0.28.1

      # 实验追踪
      - wandb==0.23.0
      - tensorboard==2.20.0
      - tensorboardX==2.6.4

      # 可视化
      - matplotlib==3.10.7

      # 配置管理
      - hydra-core==1.3.2
      - omegaconf==2.3.0

      # HDF5
      - h5py==3.15.1

      # LIBERO 仿真 (可选)
      - mujoco==3.3.7
      - robosuite==1.4.0
      - gymnasium==1.2.2
      # - libero==0.1.1
      # - robomimic==0.2.0

# ============================================================================
# 可选: Flash Attention (需要 CUDA 编译环境)
# ============================================================================
# 如需安装 Flash Attention 以提升性能:
#   pip install flash-attn==2.8.3 --no-build-isolation
#
